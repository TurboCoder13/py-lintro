---
name: Docker Setup with Hardened Runner
description: Setup Docker with proper hardened runner and egress policies
inputs:
  login:
    description: Whether to log in to a container registry
    required: false
    default: 'false'
  registry:
    description: Registry hostname (for login)
    required: false
    default: ghcr.io
  username:
    description: Registry username
    required: false
  password:
    description: Registry password or token
    required: false
  driver:
    description: Buildx driver to use (docker or docker-container)
    required: false
    default: docker
  fetch-depth:
    description: Depth for checkout fetch
    required: false
    default: '0'
  fetch-tags:
    description: Whether to fetch tags
    required: false
    default: 'true'
  persist-credentials:
    description: Whether to persist credentials
    required: false
    default: 'true'
  token:
    description: Token to use for checkout (GITHUB_TOKEN or RELEASE_TOKEN)
    required: false
    default: ''
  egress_policy:
    description: step-security harden-runner egress policy (audit|block)
    required: false
    default: 'block'
  allowed-endpoints:
    description: |-
      Newline-separated allowlist for step-security/harden-runner allowed-endpoints
      Should include both core GitHub endpoints and container registry endpoints
    required: true
runs:
  using: composite
  steps:
    - name: Harden Runner
      uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2
      with:
        egress-policy: ${{ inputs.egress_policy }}
        allowed-endpoints: ${{ inputs.allowed-endpoints }}
    
    - name: Checkout (with token)
      if: ${{ inputs.token != '' }}
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        fetch-tags: ${{ inputs.fetch-tags }}
        persist-credentials: ${{ inputs.persist-credentials }}
        token: ${{ inputs.token }}
    
    - name: Checkout (default token)
      if: ${{ inputs.token == '' }}
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        fetch-tags: ${{ inputs.fetch-tags }}
        persist-credentials: ${{ inputs.persist-credentials }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      with:
        driver: ${{ inputs.driver }}

    - name: Log in to registry
      if: inputs.login == 'true'
      uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
