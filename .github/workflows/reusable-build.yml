---
# yamllint disable rule:line-length
name: Reusable - Build & Package Validation
# Reusable workflow for Python package building and validation.
# Sets up environment, syncs dependencies, builds sdist/wheel, validates with twine,
# and uploads distribution artifacts.

'on':
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        type: string
        required: false
        default: '3.13'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Secure Checkout
        uses: ./.github/actions/secure-checkout

      - name: Environment setup
        uses: TurboCoder13/py-lintro/.github/actions/setup-env@f5c9374c8f60487ac34781fb6fb78496be0699bc
        with:
          python-version: ${{ inputs.python-version }}

      - name: Build sdist and wheel
        run: uv run python -m build

      - name: Twine check
        run: uv run python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
