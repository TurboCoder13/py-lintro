---
name: Auto-bump internal refs

'on':
  push:
    branches: [main]
    paths:
      - .github/actions/**
      - .github/workflows/reusable-*.yml
  workflow_dispatch:
    inputs:
      sha:
        description: Provide the full 40-char commit SHA to pin internal refs to
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    if: >-
      ${{ github.event_name == 'workflow_dispatch' || (
          github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message, 'bump internal refs') &&
          !startsWith(github.event.head_commit.message, 'chore(release):')
      ) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden and Checkout
        uses: TurboCoder13/py-lintro/.github/actions/harden-and-checkout@ae541c778920330b6e82f3dd536bcf2a026324c0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          egress_policy: block
          allowed-endpoints: |
            ${{ vars.EGRESS_ALLOWED_ENDPOINTS }}

      - name: Bump internal refs to current SHA
        env:
          SHA_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.sha || '' }}
        run: scripts/ci/bump-internal-refs-entry.sh

      - name: Detect changes
        id: diff
        run: scripts/ci/detect-changes.sh

      - name: Configure git for PR creation
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GIT_USER: ${{ github.actor }}
          GIT_EMAIL: ${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com
        run: scripts/ci/configure-git-user.sh

      - name: Create PR if changes
        id: cpr
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: bump internal workflow/action refs to latest SHA'
          title: 'chore: bump internal refs to latest SHA'
          body: |
            Automated update of internal action/workflow references to the
            latest commit SHA to satisfy org policy for pinned refs.
          branch: chore/bump-internal-refs-${{ github.run_id }}-${{ github.sha }}
          labels: maintenance
          delete-branch: true
