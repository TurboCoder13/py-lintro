---
name: GHCR Cleanup
'on':
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prune-untagged:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Harden Runner (audit for checkout)
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2
        with:
          egress-policy: audit
          allowed-endpoints: |
            github.com:443
            api.github.com:443

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0

      - name: Harden Runner (block for API calls)
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2
        with:
          egress-policy: block
          allowed-endpoints: |
            github.com:443
            api.github.com:443

      - name: Setup environment
        uses: TurboCoder13/py-lintro/.github/actions/setup-env@c3a9415ca116833c685f194b66c4e00e852cbb70
        with:
          python-version: '3.13'

      - name: Prune untagged GHCR versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python scripts/ci/ghcr_prune_untagged.py
