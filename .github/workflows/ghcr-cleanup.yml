---
name: GHCR Cleanup
'on':
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prune-untagged:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Harden and Checkout
        uses: TurboCoder13/py-lintro/.github/actions/harden-and-checkout@f5c9374c8f60487ac34781fb6fb78496be0699bc
        with:
          egress_policy: 'block'
          allowed-endpoints: |
            ${{ vars.EGRESS_ALLOWED_ENDPOINTS }}

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: TurboCoder13/py-lintro/.github/actions/setup-env@f5c9374c8f60487ac34781fb6fb78496be0699bc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOOTSTRAP_SKIP_SYNC: '1'
          BOOTSTRAP_SKIP_INSTALL_TOOLS: '1'
        with:
          python-version: '3.13'

      - name: Prune untagged GHCR versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python scripts/ci/ghcr_prune_untagged.py
