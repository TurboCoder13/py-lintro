# Workflow Defaults Template
# This file documents standard defaults to reduce duplication
# Copy these patterns when creating new workflows

defaults:
  # Standard configuration
  runs-on: &default-runner ubuntu-24.04
  python-version: &default-python '3.13'

  # Standard timeout values
  timeout-short: &timeout-short 10
  timeout-medium: &timeout-medium 30
  timeout-long: &timeout-long 45

  # Standard permissions (start with minimal)
  permissions-read-only: &permissions-read
    contents: read

  permissions-pr: &permissions-pr
    contents: read
    pull-requests: write

  permissions-publish: &permissions-publish
    contents: write
    id-token: write
    packages: write

  # Standard concurrency patterns
  concurrency-ref: &concurrency-ref
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

  # Standard environment variables
  standard-env: &standard-env
    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Standard job conditions
  skip-draft-prs: &skip-drafts >-
    github.event_name != 'pull_request' ||
    github.event.pull_request.draft == false

# Standard step patterns for copy-paste
standard-steps:
  harden-and-checkout: &step-harden-checkout
    name: Harden and Checkout
    uses: TurboCoder13/py-lintro/.github/actions/harden-and-checkout@ae541c778920330b6e82f3dd536bcf2a026324c0
    with:
      token: ${{ secrets.GITHUB_TOKEN }}
      egress_policy: block
      allowed-endpoints: |
        ${{ vars.EGRESS_ALLOWED_ENDPOINTS }}
        ${{ vars.EGRESS_ALLOWED_ENDPOINTS_PYPI }}

  setup-env: &step-setup-env
    name: Environment setup
    uses: TurboCoder13/py-lintro/.github/actions/setup-env@ae541c778920330b6e82f3dd536bcf2a026324c0
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      python-version: '3.13'
