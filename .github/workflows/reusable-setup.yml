---
name: Reusable Setup

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.13'
      checkout-fetch-depth:
        description: 'Fetch depth for checkout'
        required: false
        type: number
        default: 1
      checkout-persist-credentials:
        description: 'Whether to persist credentials in checkout'
        required: false
        type: boolean
        default: true
      enable-docker:
        description: 'Whether to setup Docker Buildx'
        required: false
        type: boolean
        default: false
      docker-login:
        description: 'Whether to login to GHCR'
        required: false
        type: boolean
        default: false
      docker-driver:
        description: 'Docker driver to use'
        required: false
        type: string
        default: 'docker'
      enable-harden-runner:
        description: 'Whether to enable StepSecurity harden-runner'
        required: false
        type: boolean
        default: true
      egress-policy:
        description: 'Egress policy for harden-runner'
        required: false
        type: string
        default: 'block'
      allowed-endpoints:
        description: 'Allowed endpoints for egress policy'
        required: false
        type: string
        default: ''
    secrets:
      GITHUB_TOKEN:
        description: 'GitHub token for authentication'
        required: true

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        if: inputs.enable-harden-runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: ${{ inputs.checkout-fetch-depth }}
          persist-credentials: ${{ inputs.checkout-persist-credentials }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bootstrap environment (Python, uv, deps)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/utils/bootstrap-env.sh "${{ inputs.python-version }}"

      - name: Set up Docker Buildx
        if: inputs.enable-docker
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          driver: ${{ inputs.docker-driver }}

      - name: Log in to GitHub Container Registry
        if: inputs.docker-login
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
