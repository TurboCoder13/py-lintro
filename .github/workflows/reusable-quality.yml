---
name: Reusable - Quality Gate & Version Export
# Reusable workflow for quality checks and version extraction.
# Sets up Python/uv environment, installs external tools, runs lintro format/check,
# and exports project version for downstream workflows.

'on':
  workflow_call:
    outputs:
      version:
        description: Project version from pyproject.toml
        value: ${{ jobs.quality.outputs.version }}

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Secure Checkout
        uses: ./.github/actions/secure-checkout

      - name: Environment setup
        uses: TurboCoder13/py-lintro/.github/actions/setup-env@f5c9374c8f60487ac34781fb6fb78496be0699bc
        with:
          python-version: '3.13'

      - name: Quality gate
        id: version
        run: scripts/ci/reusable-quality-entry.sh
