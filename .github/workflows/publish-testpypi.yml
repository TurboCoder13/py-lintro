---
name: Publish to TestPyPI

'on':
  workflow_dispatch:

jobs:
  quality:
    uses: TurboCoder13/py-lintro/.github/workflows/reusable-quality.yml@c3a9415ca116833c685f194b66c4e00e852cbb70

  build:
    needs: quality
    uses: TurboCoder13/py-lintro/.github/workflows/reusable-build.yml@c3a9415ca116833c685f194b66c4e00e852cbb70

  publish:
    name: Upload to TestPyPI
    needs: [build, quality]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: testpypi
    concurrency:
      group: testpypi-publish-${{ github.sha }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2
        with:
          egress-policy: audit
      - name: Download artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          skip-existing: true
          verify-metadata: false
