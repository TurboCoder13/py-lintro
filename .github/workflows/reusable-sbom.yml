---
name: Reusable SBOM Job

'on':
  workflow_call:
    outputs:
      artifact-name:
        description: Name of uploaded SBOM artifact
        value: sbom-artifacts

permissions:
  contents: read
  actions: read

jobs:
  sbom:
    name: Generate and verify SBOM
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
    env:
      XDG_CACHE_HOME: ${{ github.workspace }}/.bomctl-cache
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Harden and Checkout
        uses: TurboCoder13/py-lintro/.github/actions/harden-and-checkout@f5c9374c8f60487ac34781fb6fb78496be0699bc
        with:
          egress-policy: block
          allowed-endpoints: |
            ${{ vars.EGRESS_ALLOWED_ENDPOINTS }}
            ${{ vars.EGRESS_ALLOWED_ENDPOINTS_SIGSTORE }}
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
      - name: Install bomctl from GitHub Releases (no registries)
        env:
          BOMCTL_VERSION: v0.4.3
        run: bash scripts/ci/sbom-install-binary-gh.sh
      - name: Restore bomctl cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4
        with:
          path: ${{ env.XDG_CACHE_HOME }}
          key: bomctl-cache-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}-${{ github.sha }}
          restore-keys: |
            bomctl-cache-${{ runner.os }}-
            bomctl-cache-
      - name: Generate SBOMs (CycloneDX 1.6 JSON & SPDX 2.3)
        run: scripts/ci/sbom-generate-safe.sh
      - name: Fetch SBOM via bomctl binary (GitHub graph)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci/sbom-fetch.sh --format cyclonedx-1.6 --format spdx-2.3
      - name: Rename SBOM artifacts with tag/sha for traceability
        run: bash scripts/ci/sbom-rename-artifacts.sh dist/sbom
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-artifacts
          path: dist/sbom/*
          if-no-files-found: error
      - name: Attest SBOM artifacts with keyless cosign (optional)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: bash scripts/ci/sbom-attest-artifacts.sh dist/sbom
