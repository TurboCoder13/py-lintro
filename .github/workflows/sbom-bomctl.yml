---
name: SBOM via bomctl

'on':
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sbom-bomctl.yml'

permissions:
  contents: read
  packages: read

jobs:
  bomctl-run:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      EGRESS_ALLOWED_ENDPOINTS: ${{ vars.EGRESS_ALLOWED_ENDPOINTS }}
      XDG_CACHE_HOME: ${{ github.workspace }}/.bomctl-cache
    steps:
      - name: Harden and Checkout
        uses: TurboCoder13/py-lintro/.github/actions/harden-and-checkout@f5c9374c8f60487ac34781fb6fb78496be0699bc
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install bomctl from GitHub Releases (no registries)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOMCTL_VERSION: v0.4.3
        run: bash scripts/ci/sbom-install-binary-gh.sh

      - name: Run bomctl (binary)
        run: scripts/ci/bomctl-help-test.sh
