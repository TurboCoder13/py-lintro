---
name: SBOM via bomctl

'on':
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sbom-bomctl.yml'

permissions:
  contents: read
  packages: read

jobs:
  bomctl-run:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      EGRESS_ALLOWED_ENDPOINTS: ${{ vars.EGRESS_ALLOWED_ENDPOINTS }}
      XDG_CACHE_HOME: ${{ github.workspace }}/.bomctl-cache
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@c6295a65d1254861815972266d5933fd6e532bdf
        with:
          egress_policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            downloads.github.com:443
            objects.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install bomctl from GitHub Releases (no registries)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOMCTL_VERSION: v0.4.3
        run: bash scripts/ci/sbom-install-binary-gh.sh

      - name: Run bomctl (binary)
        run: scripts/ci/bomctl-help-test.sh
