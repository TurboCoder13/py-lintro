---
name: Maintenance - PR Comment Cleanup
# Manual workflow to clean up automated comments from PRs (coverage reports, etc.).
# Helps maintain clean PR comment history by removing outdated bot comments.

'on':
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'Pull request number to clean comments on'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            downloads.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Environment setup
        uses: TurboCoder13/py-lintro/.github/actions/setup-env@b3fb40d43cd5c2e343a7a875e283c421c59e47fd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete previous Coverage comments
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: scripts/ci/post-pr-delete-previous.sh '<!-- coverage-report -->'

      - name: Delete previous Lintro analysis comments
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: scripts/ci/post-pr-delete-previous.sh '<!-- lintro-report -->'
