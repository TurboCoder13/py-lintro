---
name: Debug Egress Policy

on:
  workflow_dispatch:

jobs:
  debug-ghcr:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    
    steps:
      - name: Harden Runner (minimal test)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2
        with:
          egress-policy: block
          allowed-endpoints: |
            github.com:443
            api.github.com:443
            ghcr.io:443
            
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        
      - name: Test Docker login to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Test basic docker command
        run: docker info
