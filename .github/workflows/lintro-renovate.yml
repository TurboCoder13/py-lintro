---
name: Maintenance - Renovate Dependencies
# Automated dependency updates using Renovate bot. Runs daily to check for
# outdated dependencies and creates PRs with updates.

'on':
  schedule:
    # Run daily at 22:00 UTC
    - cron: '0 22 * * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: renovate-${{ github.ref }}
      cancel-in-progress: false # Don't cancel renovate runs
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            downloads.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@03026bd55840025343414baec5d9337c5f9c7ea7 # v44.0.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: renovate.json
        env:
          LOG_LEVEL: debug
